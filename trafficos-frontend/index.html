<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrafficOS · Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .leaflet-popup-content-wrapper { background: #fff; border-radius: 3px; }
    .leaflet-popup-content { font-family: var(--font-mono); margin: 12px 14px; }
    .popup-title { font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #111; }
    .popup-row { display: flex; justify-content: space-between; gap: 12px; font-size: 11.5px; padding: 2px 0; color: #333; }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar" id="topbar"></header>
    <nav class="nav" id="nav"></nav>
    <main class="main" id="main">
      <div class="eyebrow">City overview</div>
      <h1 class="page-title">168 junctions monitored · 16 fully modeled</h1>
      <div class="stat-row" id="stat-row"></div>
      <div class="filter-row" id="filter-row"></div>
      <div class="map-wrap"><div id="map" style="height:100%;width:100%"></div></div>
      <div class="legend" id="legend"></div>
    </main>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/shared.js"></script>
  <script>
    renderShell('map');

    const TIER_COLOR = { HIGH: '#FF6B35', MEDIUM: '#C9A86C', LOW: '#4FBFA8', INSUFFICIENT: '#3D4451' };
    const TIER_RADIUS = { HIGH: 11, MEDIUM: 7, LOW: 5, INSUFFICIENT: 3.5 };

    let map, markers = [], allLocations = [], coverage = null, deployment = null;
    let currentFilter = 'ALL';

    async function init() {
      try {
        const [locRes, covRes, depRes] = await Promise.all([
          loadJSON('locations'), loadJSON('coverage'), loadJSON('deployment_scenarios'),
        ]);
        allLocations = locRes.data;
        coverage = covRes;
        deployment = depRes['Friday_3'];
        render();
      } catch (e) {
        showError(document.getElementById('main'), e.message, init);
      }
    }

    function render() {
      document.getElementById('stat-row').innerHTML = [
        statCard('Total junctions', coverage.total_junctions, 'scanned by the engine'),
        statCard('High confidence', coverage.tier_counts.HIGH, 'full BPR cost model', 'orange'),
        statCard('Sensor gaps', coverage.tier_counts.INSUFFICIENT, 'flagged, not hidden', 'amber'),
      ].join('');

      document.getElementById('filter-row').innerHTML = ['ALL', 'HIGH', 'MEDIUM', 'LOW', 'INSUFFICIENT'].map(t => `
        <button class="filter-btn ${currentFilter === t ? 'active' : ''}" data-tier="${t}"
          style="border-color:${t === 'ALL' ? 'var(--steel-line)' : TIER_COLOR[t]}">
          ${t === 'ALL' ? 'All junctions' : t.toLowerCase()}
          <span class="filter-count">${t === 'ALL' ? allLocations.length : (coverage.tier_counts[t] || 0)}</span>
        </button>
      `).join('');

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.tier;
          render();
        });
      });

      document.getElementById('legend').innerHTML = `
        <span class="eyebrow">Legend</span>
        ${Object.entries(TIER_COLOR).map(([tier, color]) => `
          <span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${tier.toLowerCase()}</span>
        `).join('')}
        <span class="legend-note">Only HIGH-tier junctions carry cost/sensitivity modeling — see Hotspots</span>
      `;

      renderMap();
    }

    function renderMap() {
      if (!map) {
        map = L.map('map', { zoomControl: true }).setView([12.97, 77.59], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap &copy; CARTO',
        }).addTo(map);
      }

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      const filtered = allLocations.filter(l => {
        const tier = l.tier || 'INSUFFICIENT';
        return currentFilter === 'ALL' || tier === currentFilter;
      });

      filtered.forEach(loc => {
        const tier = loc.tier || 'INSUFFICIENT';
        const isHigh = tier === 'HIGH';
        const marker = L.circleMarker([loc.latitude, loc.longitude], {
          radius: TIER_RADIUS[tier],
          color: TIER_COLOR[tier],
          fillColor: TIER_COLOR[tier],
          fillOpacity: isHigh ? 0.85 : 0.5,
          weight: isHigh ? 2 : 1,
        }).addTo(map);

        const shortName = (loc.junction_name || '').split(' - ').pop();
        let popupHtml = `<div class="popup-title">${esc(shortName)}</div>
          <div class="popup-row"><span>Tier</span><span style="color:${TIER_COLOR[tier]}">${tier}</span></div>`;
        if (loc.peak_avg_pcu != null) {
          popupHtml += `<div class="popup-row"><span>Peak PCU</span><span>${loc.peak_avg_pcu.toFixed(1)}</span></div>`;
        }
        if (loc.lanes != null) {
          popupHtml += `<div class="popup-row"><span>Lanes</span><span>${loc.lanes}</span></div>`;
        }
        if (loc.lane_confidence) {
          popupHtml += `<div class="popup-row">${confBadge(loc.lane_confidence)}</div>`;
        }
        marker.bindPopup(popupHtml);
        markers.push(marker);
      });

      // Truck routes overlay (Friday × 3 scenario)
      if (deployment) {
        const truckColors = ['#FF6B35', '#4FBFA8', '#C9A86C'];
        deployment.trucks.forEach((t, ti) => {
          if (!t.route || t.route.length === 0) return;
          const pts = t.route
            .map(s => {
              const loc = allLocations.find(l => l.junction_name === s.junction);
              return loc ? [loc.latitude, loc.longitude] : null;
            })
            .filter(Boolean);
          if (pts.length > 1) {
            const line = L.polyline(pts, {
              color: truckColors[ti % 3], weight: 2.5, opacity: 0.8, dashArray: '6 4',
            }).addTo(map);
            markers.push(line);
          }
        });
      }
    }

    init();
  </script>
</body>
</html>
